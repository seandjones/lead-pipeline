version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lead_pipeline_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lead_pipeline_net

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: lead_pipeline_n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: ${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${DOMAIN}/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
      GENERIC_TIMEZONE: America/Denver
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Pass through API keys for use in Function nodes via $env
      APIFY_API_TOKEN: ${APIFY_API_TOKEN}
      AIRTABLE_API_KEY: ${AIRTABLE_API_KEY}
      AIRTABLE_BASE_ID: ${AIRTABLE_BASE_ID}
      AIRTABLE_TABLE_NAME: ${AIRTABLE_TABLE_NAME}
      HUNTER_API_KEY: ${HUNTER_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      TARGET_CITIES: ${TARGET_CITIES}
      TARGET_VERTICALS: ${TARGET_VERTICALS}
      SCRAPER_URL: ${SCRAPER_URL}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - lead_pipeline_net

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: lead_pipeline_scraper
    restart: unless-stopped
    mem_limit: 512m
    environment:
      PORT: 3001
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS}
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - lead_pipeline_net

  nginx:
    image: nginx:alpine
    container_name: lead_pipeline_nginx
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - lead_pipeline_net

volumes:
  n8n_data:
    name: lead_pipeline_n8n_data
  postgres_data:
    name: lead_pipeline_postgres_data

networks:
  lead_pipeline_net:
    name: lead_pipeline_net
    driver: bridge
